<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry POS</title>

<meta name="theme-color" content="#007bff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="data:application/manifest+json,HtmlUrlEncoded,%7B%22short_name%22%3A%22LaundryPOS%22%2C%22name%22%3A%22Laundry%20POS%20System%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f2f2f2%22%2C%22theme_color%22%3A%22%23007bff%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20512%20512%27%3E%3Crect%20width%3D%27512%27%20height%3D%27512%27%20rx%3D%2715%25%27%20fill%3D%27%23007bff%27%2F%3E%3Cpath%20d%3D%27M160%20140h192v40H160zm0%2070h192v40H160zm0%2070h130v40H160z%27%20fill%3D%27white%27%2F%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

<style>
body {
  font-family: Arial;
  background:#f2f2f2;
  padding:10px;
}

.container {
  max-width:420px;
  margin:auto;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

select, input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  font-size:16px;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background: #007bff;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  background: #0056b3;
}

table {
  width:100%;
  margin-top:15px;
  border-collapse: collapse;
}

th, td {
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
  font-size:13px;
}

.total {
  font-weight:bold;
  margin: 5px 0;
}

.delete-btn {
  background:red;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
  border-radius: 3px;
  width: auto;
}

.header {
  text-align:center;
  margin-bottom:10px;
}

.small {
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h3>Laundry POS</h3>
  <div class="small" id="datetime"></div>
</div>

<select id="item"></select>

<select id="service">
  <option value="L">Laundry</option>
  <option value="W">Wet Cleaning</option>
  <option value="P">Pressing</option>
</select>

<input type="number" id="qty" placeholder="Qty" inputmode="numeric">

<select id="type">
  <option value="1" data-code="R">Regular</option>
  <option value="1.5" data-code="X">Express</option>
  <option value="0.5" data-code="K">Kids</option>
</select>

<button onclick="tambah()" style="background:#28a745;">Tambah (Enter)</button>
<button onclick="printStruk()">Print</button>
<button onclick="resetAll()" style="background:#dc3545;">Reset</button>

<table id="table">
<thead>
<tr>
<th>Item</th>
<th>Svc</th>
<th>Type</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>

<p class="total">Total Pieces: <span id="pieces">0</span></p>
<p class="total">Subtotal: Rp <span id="total">0</span></p>
<p class="total">Tax (21%): Rp <span id="tax">0</span></p>
<p class="total">Grand Total: Rp <span id="grand">0</span></p>

</div>

<script>
// PRICE LIST
const prices = {
"Trouser": {L:127000,W:135000,P:104000},
"Shirt (Long Sleeve)": {L:127000,W:135000,P:104000},
"Shirt (Short Sleeve)": {L:115000,W:116000,P:104000},
"Sport Shirt": {L:105000,W:105000,P:93000},
"Under pants": {L:64000},
"Undershirt": {L:64000},
"Necktie": {W:80000,P:70000},
"Blouse": {L:127000,W:138000,P:93000},
"Dress": {L:127000,W:200000,P:121000},
"Skirt": {L:110000,W:150000,P:93000},
"Slack": {L:127000,W:139000,P:104000},
"Brassieres": {L:64000},
"Panties": {L:64000},
"Suit (2pcs)": {W:230000,P:195500},
"Sweater": {L:110000,W:120000,P:93000},
"Pyjamas (2pcs)": {L:93000,W:92000,P:75000},
"T'Shirt": {L:93000,W:100000,P:85000},
"Socks": {L:63000},
"Shorts": {L:81000,W:80000,P:75000},
"Jeans": {L:127000,W:138000,P:99000},
"Jacket": {L:130000,W:145000,P:120000},
"Handkerchief": {L:58000},
"Scarf/Hijab/Apron/Hat": {L:60500,W:70000,P:55000},
"Blanket/Bath Towel": {L:110000},
"Sarung": {L:121000,W:130000,P:110000}
};

let grandTotal = 0;
let totalPieces = 0;

// DATE TIME
function updateDateTime(){
  let now = new Date();
  document.getElementById('datetime').innerText = now.toLocaleString('id-ID');
}
setInterval(updateDateTime, 1000);
updateDateTime();

// POPULATE ITEM
let itemSelect = document.getElementById('item');
itemSelect.innerHTML = '<option value="">-- Pilih Item --</option>';

for(let item in prices){
  let opt = document.createElement("option");
  opt.value = item;
  opt.text = item;
  itemSelect.appendChild(opt);
}

// TAMBAH ITEM
function tambah(){
  let item = document.getElementById('item').value;
  let service = document.getElementById('service').value;
  let qty = parseInt(document.getElementById('qty').value);
  let typeSelect = document.getElementById('type');

  let multiplier = parseFloat(typeSelect.value);
  let typeName = typeSelect.options[typeSelect.selectedIndex].text;

  if(!item || !qty || isNaN(qty)){
    alert("Pilih item dan isi qty");
    return;
  }

  if(!prices[item][service]){
    alert("Service tidak tersedia untuk item ini");
    return;
  }

  let basePrice = prices[item][service];
  let total = basePrice * qty * multiplier;

  grandTotal += total;
  totalPieces += qty;

  let tbody = document.querySelector("#table tbody");
  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${item}</td>
    <td>${service}</td>
    <td>${typeName}</td>
    <td>${qty}</td>
    <td>${total.toLocaleString('id-ID')}</td>
    <td>
      <button class="delete-btn" onclick="hapusRow(this, ${total}, ${qty})">X</button>
    </td>
  `;
  tbody.appendChild(tr);

  updateTotal();
  document.getElementById('qty').value = '';
}

// HAPUS ROW
function hapusRow(btn, total, qty){
  btn.parentElement.parentElement.remove();
  grandTotal -= total;
  totalPieces -= qty;
  updateTotal();
}

// UPDATE TOTAL
function updateTotal(){
  let subtotal = grandTotal;
  let tax = subtotal * 0.21;
  let grand = subtotal + tax;

  // PEMBULATAN KE RIBUAN
  grand = Math.round(grand / 1000) * 1000;

  document.getElementById('pieces').innerText = totalPieces;
  document.getElementById('total').innerText = subtotal.toLocaleString('id-ID');
  document.getElementById('tax').innerText = Math.round(tax).toLocaleString('id-ID');
  document.getElementById('grand').innerText = grand.toLocaleString('id-ID');
}

// PRINT
function printStruk(){
  window.print();
}

// RESET
function resetAll(){
  document.querySelector("#table tbody").innerHTML = '';
  grandTotal = 0;
  totalPieces = 0;
  updateTotal();
}

// ENTER KEY
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    tambah();
  }
});

// OTOMATIS GENERATE SERVICE WORKER (Agar Bisa Diinstal & Offline)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      const CACHE_NAME = 'laundry-pos-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['/'])));
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    
    navigator.serviceWorker.register(swUrl, { scope: '/' })
      .then(reg => console.log('PWA Siap!'))
      .catch(err => console.error('PWA Gagal:', err));
  });
}
</script>

</body>
</html>
